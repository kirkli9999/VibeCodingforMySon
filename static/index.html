<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Triple Choice: Ace Duel 終極三選一</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 連線狀態 -->
    <div id="status-overlay">
        <div id="status-text">連線中...</div>
    </div>

    <!-- 遊戲畫布 -->
    <canvas id="game-canvas"></canvas>

    <!-- 觸控按鈕 -->
    <div id="controls">
        <div id="dpad">
            <button class="ctrl-btn" data-action="left">◀</button>
            <button class="ctrl-btn" data-action="crouch">▼</button>
            <button class="ctrl-btn" data-action="right">▶</button>
        </div>
        <div id="action-buttons">
            <button class="ctrl-btn action-btn" data-action="jump">跳</button>
        </div>
    </div>

    <script src="controls.js"></script>
    <script src="game.js"></script>
</body>
</html>
